<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dexi.in | Coming Soon</title>
  <meta name="description" content="Dexi.in is an upcoming premium UI/UX library. Discover the best mobile and web screens." />
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Ambient background elements -->
  <div class="ambient-bg">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="cursor-glow" id="cursor-glow"></div>
  </div>

  <div class="noise-overlay"></div>

  <div class="container">
    <!-- Header / Nav -->
    <header>
      <div class="logo">
        <span class="logo-icon"></span>
        <span class="logo-text">Dexi.in</span>
      </div>
      <div class="status-badge">
        <span class="pulse"></span> Under Construction
      </div>
    </header>

    <!-- Main Content -->
    <main>
      <div class="content-wrapper">
        <h1 class="glitch" data-text="Coming Soon.">Coming Soon.</h1>
        <p class="subtitle">The ultimate UI/UX library is brewing. We are curating the finest mobile and web screens for your inspiration.</p>
      </div>

      <!-- Decorative Floating Cards in the background -->
      <div class="floating-cards">
        <div class="card card-1">
          <div class="card-header"></div>
          <div class="card-line w-full"></div>
          <div class="card-line w-75"></div>
          <div class="card-image"></div>
        </div>
        <div class="card card-2">
          <div class="card-header"></div>
          <div class="card-image tall"></div>
          <div class="card-line w-50"></div>
        </div>
        <div class="card card-3">
          <div class="card-header"></div>
          <div class="card-line w-80"></div>
          <div class="card-image box"></div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer>
      <p>&copy; <span id="year"></span> Dexi.in. All rights reserved.</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
